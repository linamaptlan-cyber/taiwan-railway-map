<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全台鐵道轉乘調查系統</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; margin: 0; padding: 15px; color: #1f2937; }
    h1 { text-align: center; color: #065f46; font-size: 1.5rem; margin-bottom: 20px; }
    h3 { margin-top: 0; color: #047857; border-bottom: 2px solid #a7f3d0; padding-bottom: 5px; }
    .step-container { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
    .step-container.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 10px; }
    button { background-color: #ecfdf5; border: 2px solid #6ee7b7; color: #065f46; padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
    button:hover, button.selected { background-color: #10b981; color: white; border-color: #059669; }
    .submit-btn { background-color: #f59e0b; color: white; border: none; width: 100%; padding: 16px; font-size: 1.2rem; margin-top: 20px; border-radius: 10px; }
    select { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #6ee7b7; background-color: #fff; margin-top: 10px; }
    .train-scroll-view { max-height: 60vh; overflow-y: auto; background: #e5e7eb; padding: 15px; border-radius: 10px; margin-top: 15px; border: 3px solid #9ca3af;}
    .train-direction-hint { text-align: center; font-weight: bold; margin-bottom: 15px; color: #dc2626; background: #fecaca; padding: 8px; border-radius: 6px; }
    .train-car { background: white; border: 3px solid #6b7280; border-radius: 10px; margin-bottom: 20px; padding: 15px; }
    .train-car-title { text-align: center; font-weight: bold; margin-bottom: 15px; color: #374151; font-size: 1.2rem; background: #f3f4f6; padding: 5px; border-radius: 4px; }
    .doors-container { display: flex; justify-content: space-between; gap: 8px; }
    .door-btn { flex: 1; background: #d1d5db; border: 2px solid #9ca3af; padding: 15px 0; color: #1f2937; border-radius: 6px; font-size: 0.9rem; }
    .door-btn.selected { background: #3b82f6; border-color: #2563eb; color: white; }
    .photo-area { margin-top: 20px; background: #f9fafb; padding: 15px; border-radius: 8px; border: 1px dashed #9ca3af; }
    input[type="file"] { display: block; margin-top: 10px; width: 100%; }
    #previewImg { max-width: 100%; border-radius: 8px; display: none; margin-top: 10px; }
    #loading { display: none; text-align: center; font-weight: bold; color: #059669; margin-top: 15px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>🚉 鐵道轉乘資訊踏查系統</h1>
  
  <div id="step-system" class="step-container active">
    <h3>1. 選擇鐵路系統</h3>
    <div id="system-btns" class="btn-grid"></div>
  </div>
  
  <div id="step-route" class="step-container">
    <h3>2. 選擇營運路線</h3>
    <div id="route-btns" class="btn-grid"></div>
  </div>
  
  <div id="step-station" class="step-container">
    <h3>3. 選擇車站</h3>
    <select id="station-select"></select>
    <button onclick="confirmStation()" style="width: 100%; margin-top: 15px; background-color: #0ea5e9; color: white; border: none;">確認車站，下一步</button>
  </div>
  
  <div id="step-dir-train" class="step-container">
    <h3>4. 搭乘方向與車型</h3>
    <div class="btn-grid" id="dir-btns"></div>
    <h4 style="margin-top: 20px; color: #047857;">選擇列車型號</h4>
    <div id="train-type-btns" class="btn-grid"></div>
  </div>
  
  <div id="step-train-ui" class="step-container">
    <h3>5. 點擊最近的車門位置</h3>
    <div class="train-scroll-view">
      <div class="train-direction-hint">⬆️ 列車車頭方向 ⬆️</div>
      <div id="train-cars-container"></div>
    </div>
  </div>
  
  <div id="step-facility" class="step-container">
    <h3>6. 正對著哪個設施？</h3>
    <div class="btn-grid" id="facility-btns">
      <button onclick="selectFacility('樓梯 (上)', this)">樓梯 (上)</button>
      <button onclick="selectFacility('樓梯 (下)', this)">樓梯 (下)</button>
      <button onclick="selectFacility('電扶梯 (上)', this)">電扶梯 (上)</button>
      <button onclick="selectFacility('電扶梯 (下)', this)">電扶梯 (下)</button>
      <button onclick="selectFacility('無障礙電梯', this)">電梯</button>
      <button onclick="selectFacility('同月台轉乘', this)">同月台轉乘</button>
      <button onclick="selectFacility('一般出口', this)">直接出站</button>
    </div>
    <div class="photo-area">
      <h4 style="margin: 0; color: #374151;">📸 現場照片 (選填)</h4>
      <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="previewPhoto(event)">
      <img id="previewImg" alt="預覽圖">
    </div>
    <button class="submit-btn" onclick="submitData()">🚀 送出調查資料</button>
    <div id="loading">資料傳送中，請稍候...</div>
  </div>

  <script>
    // ⚠️ 記得貼上你的 Google Apps Script 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyv-JhQ2iLs2d6JLQDO5HwgylKXId87parbsKTAR9Hj1D5MC_uU0qvOkMt53CWIHaqN/exec";

    // ＝＝＝＝＝ 站點資料庫 (包含高雄捷運最新圖資) ＝＝＝＝＝
    const railwaySystemData = {
      "高鐵 (THSR)": { "全線": ["南港", "台北", "板橋", "桃園", "新竹", "苗栗", "台中", "彰化", "雲林", "嘉義", "台南", "左營"] },
      "台鐵 (TRA)": {

        "山線": ["造橋", "豐富", "苗栗", "南勢", "銅鑼", "三義", "泰安", "后里", "豐原", "栗林", "潭子", "頭家厝", "松竹", "太原", "精武", "台中", "五權", "大慶", "烏日", "新烏日", "成功", "彰化"],
        "海線": ["談文", "大山", "後龍", "龍港", "白沙屯", "新埔", "通霄", "苑裡", "日南", "大甲", "台中港", "清水", "沙鹿", "龍井", "大肚", "追分", "彰化"],
        "縱貫線南段": ["彰化", "花壇", "大村", "員林", "永靖", "社頭", "田中", "二水", "林內", "石榴", "斗六", "斗南", "石龜", "大林", "民雄", "嘉北", "嘉義", "水上", "南靖", "後壁", "新營", "柳營", "林鳳營", "隆田", "拔林", "善化", "南科", "新市", "永康", "大橋", "台南", "保安", "仁德", "中洲", "大湖", "路竹", "岡山", "橋頭", "楠梓", "新左營", "左營", "內惟", "美術館", "鼓山", "三塊厝", "高雄"],
        "屏東線": ["高雄", "民族", "科工館", "正義", "鳳山", "後庄", "九曲堂", "六塊厝", "屏東", "歸來", "麟洛", "西勢", "竹田", "潮州", "崁頂", "南州", "鎮安", "林邊", "佳冬", "東海", "枋寮"],
        "南迴線": ["枋寮", "加祿", "內獅", "枋山", "大武", "瀧溪", "金崙", "太麻里", "知本", "康樂", "台東"]
      },
      "台北捷運 (Taipei MRT)": {
        "板南線 (BL)": ["南港展覽館", "南港", "昆陽", "後山埤", "永春", "市政府", "國父紀念館", "忠孝敦化", "忠孝復興", "忠孝新生", "善導寺", "台北車站", "西門", "龍山寺", "江子翠", "新埔", "板橋", "府中", "亞東醫院", "海山", "土城", "永寧", "頂埔"],
        "淡水信義線 (R)": ["淡水", "紅樹林", "竹圍", "關渡", "忠義", "復興崗", "北投", "奇岩", "唭哩岸", "石牌", "明德", "芝山", "士林", "劍潭", "圓山", "民權西路", "雙連", "中山", "台北車站", "台大醫院", "中正紀念堂", "東門", "大安森林公園", "大安", "信義安和", "台北101/世貿", "象山", "新北投"],
        "松山新店線 (G)": ["松山", "南京三民", "台北小巨蛋", "南京復興", "松江南京", "中山", "北門", "西門", "小南門", "中正紀念堂", "古亭", "台電大樓", "公館", "萬隆", "景美", "大坪林", "七張", "新店區公所", "新店", "小碧潭"],
        "中和新蘆線 (O)": ["蘆洲", "三民高中", "徐匯中學", "三和國中", "三重國小", "迴龍", "丹鳳", "輔大", "新莊", "頭前庄", "先嗇宮", "三重", "菜寮", "台北橋", "大橋頭", "民權西路", "中山國小", "行天宮", "松江南京", "忠孝新生", "東門", "古亭", "頂溪", "永安市場", "景安", "南勢角"],
        "文湖線 (BR)": ["南港展覽館", "南港軟體園區", "東湖", "葫洲", "大湖公園", "內湖", "文德", "港墘", "西湖", "劍南路", "大直", "松山機場", "中山國中", "南京復興", "忠孝復興", "大安", "科技大樓", "六張犁", "麟光", "辛亥", "萬芳醫院", "萬芳社區", "木柵", "動物園"]
      },
      "高雄捷運 (Kaohsiung MRT)": {
        "紅線 (R)": ["岡山車站", "岡山高醫", "橋頭火車站", "橋頭糖廠", "青埔", "都會公園", "後勁", "楠梓科技園區", "油廠國小", "世運", "左營", "生態園區", "巨蛋", "凹子底", "後驛", "高雄車站", "美麗島", "中央公園", "三多商圈", "獅甲", "凱旋", "前鎮高中", "草衙", "高雄國際機場", "小港"],
        "橘線 (O)": ["哈瑪星", "鹽埕埔", "前金", "美麗島", "信義國小", "文化中心", "五塊厝", "技擊館", "衛武營", "鳳山西站", "鳳山", "大東", "鳳山國中", "大寮"],
        "環狀輕軌 (C)": ["籬仔內", "凱旋瑞田", "前鎮之星", "凱旋中華", "夢時代", "經貿園區", "軟體園區", "高雄展覽館", "旅運中心", "光榮碼頭", "真愛碼頭", "駁二大義", "駁二蓬萊", "哈瑪星", "壽山公園", "文武聖殿", "鼓山區公所", "鼓山", "馬卡道", "臺鐵美術館", "內惟藝術中心", "美術館", "聯合醫院", "龍華國小", "愛河之心", "新上國小", "大順民族", "灣仔內", "高雄高工", "樹德家商", "科工館", "聖功醫院", "凱旋公園", "衛生局", "五權國小", "凱旋武昌", "凱旋二聖", "輕軌機廠"]
      },
      "桃園捷運 (Taoyuan MRT)": {
        "機場線 (A)": ["台北車站", "三重", "新北產業園區", "新莊副都心", "泰山", "泰山貴和", "體育大學", "長庚醫院", "林口", "山鼻", "坑口", "機場第一航廈", "機場第二航廈", "機場旅館", "大園", "橫山", "領航", "高鐵桃園站", "桃園體育園區", "興南", "環北", "老街溪"]
      },
      "台中捷運 (Taichung MRT)": {
        "綠線 (G)": ["北屯總站", "舊社", "松竹", "四維國小", "文心崇德", "文心中清", "文華高中", "文心櫻花", "市政府", "水安宮", "文心森林公園", "南屯", "豐樂公園", "大慶", "九張犁", "九德", "烏日", "高鐵台中站"]
      }
    };

    // ＝＝＝＝＝ 路線專屬端點方向資料庫 ＝＝＝＝＝
    const directionData = {
      "台鐵 (TRA)": ["北上 / 順行", "南下 / 逆行"],
      "高鐵 (THSR)": ["北上", "南下"],
      "紅線 (R)": ["往 岡山車站", "往 小港"],
      "橘線 (O)": ["往 哈瑪星", "往 大寮"],
      "環狀輕軌 (C)": ["順行 (順時針)", "逆行 (逆時針)"],
      "板南線 (BL)": ["往 南港展覽館", "往 頂埔 / 亞東醫院"],
      "淡水信義線 (R)": ["往 淡水 / 北投", "往 象山 / 大安"],
      "松山新店線 (G)": ["往 松山", "往 新店 / 台電大樓"],
      "中和新蘆線 (O)": ["往 蘆洲 / 迴龍", "往 南勢角"],
      "文湖線 (BR)": ["往 南港展覽館", "往 動物園"],
      "機場線 (A)": ["往 台北車站", "往 老街溪"],
      "綠線 (G)": ["往 北屯總站", "往 高鐵台中站"]
    };

    const trainSpecs = {
      "EMU900 (最美區間)": { cars: 10, doors: 3 },
      "EMU800/700 (微笑區間)": { cars: 8, doors: 3 },
      "EMU3000 (新自強)": { cars: 12, doors: 2 },
      "普悠瑪 / 太魯閣": { cars: 8, doors: 1 },
      "推拉式自強 (PP)": { cars: 12, doors: 1 },
      "700T (高鐵)": { cars: 12, doors: 2 },
      "北捷高運量 (6節)": { cars: 6, doors: 4 },
      "北捷文湖線 (4節)": { cars: 4, doors: 2 },
      "高捷重軌 (3節)": { cars: 3, doors: 4 },
      "中捷綠線 (2節)": { cars: 2, doors: 5 },
      "機捷直達車 (5節)": { cars: 5, doors: 3 },
      "機捷普通車 (4節)": { cars: 4, doors: 3 },
      "高雄輕軌 (5節)": { cars: 5, doors: 2 }
    };

    let surveyData = { system: "", route: "", station: "", direction: "", trainType: "", car: "", door: "", facility: "", photoBase64: "" };

    window.onload = () => {
      const systemContainer = document.getElementById("system-btns");
      Object.keys(railwaySystemData).forEach(sys => {
        let btn = document.createElement("button");
        btn.innerText = sys;
        btn.onclick = (e) => { surveyData.system = sys; highlightBtn(systemContainer, e.target); renderRoutes(sys); };
        systemContainer.appendChild(btn);
      });
    };

    function renderRoutes(system) {
      const routeContainer = document.getElementById("route-btns");
      routeContainer.innerHTML = ""; 
      document.getElementById("step-route").classList.add("active");
      document.getElementById("step-station").classList.remove("active");
      document.getElementById("step-dir-train").classList.remove("active");

      Object.keys(railwaySystemData[system]).forEach(route => {
        let btn = document.createElement("button");
        btn.innerText = route;
        btn.onclick = (e) => { surveyData.route = route; highlightBtn(routeContainer, e.target); renderStations(system, route); };
        routeContainer.appendChild(btn);
      });
    }

    function renderStations(system, route) {
      const stationSelect = document.getElementById("station-select");
      stationSelect.innerHTML = "";
      document.getElementById("step-station").classList.add("active");
      railwaySystemData[system][route].forEach(station => {
        let option = document.createElement("option");
        option.value = station; option.innerText = station;
        stationSelect.appendChild(option);
      });
    }

    function confirmStation() {
      surveyData.station = document.getElementById("station-select").value;
      document.getElementById("step-dir-train").classList.add("active");
      
      // 動態生成「搭乘方向」按鈕 (判斷是台鐵/高鐵還是捷運)
      const dirContainer = document.getElementById("dir-btns");
      dirContainer.innerHTML = "";
      surveyData.direction = ""; 

      let dirs = [];
      if (surveyData.system.includes("台鐵")) dirs = directionData["台鐵 (TRA)"];
      else if (surveyData.system.includes("高鐵")) dirs = directionData["高鐵 (THSR)"];
      else dirs = directionData[surveyData.route] || ["去程", "回程"]; // 捷運端點站

      dirs.forEach(d => {
        let btn = document.createElement("button");
        btn.innerText = d;
        btn.onclick = (e) => selectDirection(d, e.target);
        dirContainer.appendChild(btn);
      });

      renderTrainTypes();
    }

    function selectDirection(dir, btnElement) {
      surveyData.direction = dir; highlightBtn(document.getElementById("dir-btns"), btnElement);
    }

    function renderTrainTypes() {
      const typeContainer = document.getElementById("train-type-btns");
      typeContainer.innerHTML = "";
      let availableTypes = [];
      
      if (surveyData.system.includes("台鐵")) {
        availableTypes = ["EMU900 (最美區間)", "EMU800/700 (微笑區間)", "EMU3000 (新自強)", "普悠瑪 / 太魯閣", "推拉式自強 (PP)"];
      } else if (surveyData.system.includes("高鐵")) {
        availableTypes = ["700T (高鐵)"];
      } else if (surveyData.system.includes("台北捷運")) {
        availableTypes = surveyData.route.includes("文湖") ? ["北捷文湖線 (4節)"] : ["北捷高運量 (6節)"];
      } else if (surveyData.system.includes("高雄捷運")) {
        availableTypes = surveyData.route.includes("輕軌") ? ["高雄輕軌 (5節)"] : ["高捷重軌 (3節)"];
      } else if (surveyData.system.includes("桃園捷運")) {
        availableTypes = ["機捷普通車 (4節)", "機捷直達車 (5節)"];
      } else if (surveyData.system.includes("台中捷運")) {
        availableTypes = ["中捷綠線 (2節)"];
      }

      availableTypes.forEach(type => {
        let btn = document.createElement("button");
        btn.innerText = type;
        btn.onclick = (e) => {
          if(!surveyData.direction) { alert("⚠️ 請先選擇上方的搭乘方向喔！"); return; }
          surveyData.trainType = type; highlightBtn(typeContainer, e.target); buildTrainUI(type); 
        };
        typeContainer.appendChild(btn);
      });
    }

    function buildTrainUI(trainType) {
      document.getElementById("step-train-ui").classList.add("active");
      const container = document.getElementById("train-cars-container");
      container.innerHTML = ""; 
      const spec = trainSpecs[trainType];
      
      for (let c = 1; c <= spec.cars; c++) {
        let carDiv = document.createElement("div"); carDiv.className = "train-car";
        let carTitle = document.createElement("div"); carTitle.className = "train-car-title"; carTitle.innerText = `第 ${c} 車廂`;
        carDiv.appendChild(carTitle);
        let doorsDiv = document.createElement("div"); doorsDiv.className = "doors-container";

        for (let d = 1; d <= spec.doors; d++) {
          let doorBtn = document.createElement("button"); doorBtn.className = "door-btn"; doorBtn.innerText = `${d}號門`;
          doorBtn.onclick = (e) => {
            document.querySelectorAll('.door-btn').forEach(b => b.classList.remove('selected'));
            e.target.classList.add('selected');
            surveyData.car = c; surveyData.door = d;
            document.getElementById("step-facility").classList.add("active");
            document.getElementById("step-facility").scrollIntoView({ behavior: 'smooth' });
          };
          doorsDiv.appendChild(doorBtn);
        }
        carDiv.appendChild(doorsDiv); container.appendChild(carDiv);
      }
    }

    function selectFacility(fac, btnElement) {
      surveyData.facility = fac; highlightBtn(document.getElementById("facility-btns"), btnElement);
    }

    function previewPhoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById("previewImg").src = e.target.result;
        document.getElementById("previewImg").style.display = "block";
        surveyData.photoBase64 = e.target.result; 
      };
      reader.readAsDataURL(file);
    }

    function submitData() {
      if (!surveyData.station || !surveyData.car || !surveyData.door || !surveyData.facility) {
        alert("⚠️ 請確認「車站、車門、對應設施」皆已選擇完畢！"); return;
      }
      if (GAS_URL.includes("你的_GAS_網址_貼在這裡")) {
        alert("🛑 系統錯誤：請先在程式碼中貼上你專屬的 Google Apps Script 網址！"); return;
      }
      document.getElementById("loading").style.display = "block";
      fetch(GAS_URL, {
        method: 'POST', body: JSON.stringify(surveyData), headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
      })
      .then(res => res.json())
      .then(result => {
        document.getElementById("loading").style.display = "none";
        if (result.status === "success") { alert("🎉 紀錄成功！"); location.reload(); } 
        else { alert("❌ 錯誤：" + result.message); }
      }).catch(error => {
        document.getElementById("loading").style.display = "none"; alert("📡 網路連線異常，請檢查網路。"); console.error(error);
      });
    }

    function highlightBtn(container, targetBtn) {
      const btns = container.getElementsByTagName("button");
      for (let b of btns) b.classList.remove("selected");
      targetBtn.classList.add("selected");
    }
  </script>
</body>
</html>
